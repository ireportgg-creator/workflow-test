<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>접수 및 공정 모니터링</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h2>새 작업 접수</h2>
    <div class="form-group">
        <label>상호</label>
        <input type="text" id="company">
    </div>
    <div class="form-group">
        <label>작업명</label>
        <input type="text" id="jobName">
    </div>
    <div class="form-group">
        <label>담당자</label>
        <input type="text" id="manager">
    </div>
    <div class="form-group">
        <label>담당자 전화번호</label>
        <input type="text" id="phone">
    </div>
    <div class="form-group">
        <label>진행 상황</label>
        <select id="status">
            <option value="접수완료">접수완료</option>
            <option value="출력">출력</option>
             <option value="인쇄">인쇄</option>
            <option value="후가공">후가공</option>
            <option value="제본">제본</option>
            <option value="납품">납품</option>
            <option value="완료">완료</option>
        </select>
    </div>
    <button id="submitBtn">접수</button>

    <script type="module">
        // Firebase 앱 및 Firestore 라이브러리 로드
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // TODO: Firebase 콘솔에서 복사한 config를 여기에 붙여넣으세요.
        const firebaseConfig = {
          apiKey: "AIzaSyDEzIHcKHZpDu3QUpX62UUTXVvZmMO16yI",
          authDomain: "process-monitoring-test-ad6df.firebaseapp.com",
          databaseURL: "https://process-monitoring-test-ad6df-default-rtdb.firebaseio.com",
          projectId: "process-monitoring-test-ad6df",
          storageBucket: "process-monitoring-test-ad6df.firebasestorage.app",
          messagingSenderId: "307090124203",
          appId: "1:307090124203:web:0478a3e30f0fd6101276ee",
          measurementId: "G-ZHP1T48CWT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const data = {
                company: document.getElementById('company').value,
                jobName: document.getElementById('jobName').value,
                manager: document.getElementById('manager').value,
                phone: document.getElementById('phone').value,
                status: document.getElementById('status').value,
                createdAt: serverTimestamp()
            };

            try {
                const docRef = await addDoc(collection(db, "orders"), data);
                alert("접수가 완료되었습니다! (ID: " + docRef.id + ")");
                // 입력창 초기화
                document.querySelectorAll('input').forEach(input => input.value = '');
            } catch (e) {
                console.error("에러 발생: ", e);
                alert("저장 실패: " + e.message);
            }
        });
    </script>
</body>
</html>
